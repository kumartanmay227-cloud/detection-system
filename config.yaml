# Road Hazard Detection Config

project:
  name: road_hazard_detection
  seed: 42

data:
  root_dir: ./data
  dataset: bdd100k  # or 'coco'
  classes: ['pothole', 'obstacle', 'pedestrian', 'vehicle', 'debris', 'person', 'car', 'truck']
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  img_size: 640
  batch_size: 16

model:
  name: yolov8n  # yolov8n, yolov8s, yolov8m
  pretrained: true
  device: cpu  # auto or cpu since no GPU
  epochs: 50
  lr: 0.01
  patience: 10

augmentation:
  fog_prob: 0.5
  blur_prob: 0.3
  brightness_prob: 0.4
  noise_prob: 0.3

inference:
  conf_threshold: 0.5
  iou_threshold: 0.5
  source: 0  # 0 for webcam, or video path
  show_fps: true

paths:
  models_dir: ./models
  logs_dir: ./logs
  outputs_dir: ./outputs

